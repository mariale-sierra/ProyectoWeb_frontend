<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Letterboxd Series Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-content">
    <div class="logo">
      <span class="circle orange"></span>
      <span class="circle green"></span>
      <span class="circle blue"></span>
      <span class="name">Letterboxd</span>
    </div>

    <nav class="nav-links">
      <button onclick="showSection('home')">Home</button>
      <button onclick="showSection('search')">Search</button>
      <button onclick="showSection('ratings')">Ratings</button>
    </nav>
    </div>
  </header>
  <div class="container">
    <section id="home" class="section">
      <h1>My Series Tracker</h1>
      <div class="series-actions">
        <button onclick="showCreateForm()">Create Series</button>
      </div>

      <div id="create-form" class="hidden">
        <input type="text" id="new-name" placeholder="Series name">
        <input type="number" id="new-total" placeholder="Total episodes">
        <input type="text" id="new-image" placeholder="Image URL">
        <button onclick="createSeries()">Save</button>
      </div>

      <div class="sort-controls">
        <button onclick="sortBy('name')">Sort Name</button>
        <button onclick="sortBy('current_episode')">Sort Progress</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Current/Total</th>
            <th>Episodes left</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody id="series-body"></tbody>
      </table>

      <div class="pagination">
        <button onclick="loadHome(currentPage - 1)">Prev</button>
        <button onclick="loadHome(currentPage + 1)">Next</button>
      </div>
    </section>

    <section id="search" class="section hidden">
      <input type="text" id="search-input" placeholder="Search series...">
      <button onclick="searchSeries()">Search</button>

      <div id="search-results"></div>
    </section>

    <section id="ratings" class="section hidden">
      <h2>My Ratings</h2>
      <div id="ratings-controls"></div>
    </section>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
