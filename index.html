<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Series Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1>Series Tracker</h1>

  <div class="add-container">
    <button id="add-btn" class="add-btn">Add Series</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Current</th>
        <th>Total</th>
        <th>Next</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody id="series-body"></tbody>
  </table>

  <script type="module" src="js/app.js"></script>
</body>
</html>
